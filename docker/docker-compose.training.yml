# One-shot training job for Phase 1 classifier.
# Run with: scripts/trainDGX.sh [extra toolchain.py args...]
#
# This file is intended to be executed ON the DGX Spark after syncing
# the project with scripts/syncToDGX.sh.
services:
  aircraft-training:
    build:
      context: ..
      dockerfile: docker/Dockerfile.training
    image: aircraft-audio-training:latest
    container_name: aircraft-training

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Avoids OOM fragmentation on long training runs
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True

    volumes:
      # Project source (code, scripts, pyproject.toml) — no dataset here
      - /home/jdn/Code/AircraftAudioId:/home/jdn/Code/AircraftAudioId:ro
      # Dataset from NFS-mounted drive (overrides the symlink inside the project mount).
      # Set AIRCRAFT_DATA_DIR on the host if the NFS mount point differs.
      # Default: /mnt/aircraft-data/AircraftData  (standard DGX Spark fstab entry)
      - ${AIRCRAFT_DATA_DIR:-/mnt/aircraft-data/AircraftData}/dataset:/home/jdn/Code/AircraftAudioId/dataset:ro
      # Checkpoints are written to a separate writable volume
      - ${CHECKPOINT_DIR:-/home/jdn/Code/AircraftAudioId/checkpoints}:/checkpoints

    working_dir: /home/jdn/Code/AircraftAudioId

    # Default args; trainDGX.sh appends TRAINING_ARGS for user overrides
    command: >
      --trainCsv /home/jdn/Code/AircraftAudioId/dataset/train.csv
      --valCsv   /home/jdn/Code/AircraftAudioId/dataset/val.csv
      --outputDir /checkpoints
      ${TRAINING_ARGS:-}

    # Shared host IPC namespace — required for DataLoader pin_memory workers;
    # the default 64 MB /dev/shm causes errors at non-trivial batch sizes.
    ipc: host

    restart: "no"
